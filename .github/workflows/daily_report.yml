name: Financial News Daily Mailer

on:
  schedule:
    - cron: '7 0 * * *'
  workflow_dispatch:

jobs:
  send-news-mail:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run script and Send Mail
      env:
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # 👈 核心：就是在这里多加这一行
      run: python fetch_news.py


    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Commit and Push Changes
      run: |
        git add *.md
        git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新今日财经新闻简报" && git push)

    - name: Read Daily Report Content
      id: read_report
      run: |
        LATEST_FILE=$(ls -t *.md 2>/dev/null | head -n 1)
        if [ -z "$LATEST_FILE" ]; then
          echo "REPORT_CONTENT=今天尚未生成新的财经日报文本，请检查 Python 脚本状态。" >> $GITHUB_OUTPUT
        else
          echo "REPORT_CONTENT<<EOF" >> $GITHUB_OUTPUT
          cat "$LATEST_FILE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi

    - name: Send Telegram Message via Curl
      env:
        TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TG_TO: ${{ secrets.TELEGRAM_TO }}
      run: |
        # 核心防错：使用 xargs 自动强行剥离 Token 和 ID 里的所有换行符与空格
        CLEAN_TOKEN=$(echo "$TG_TOKEN" | xargs)
        CLEAN_TO=$(echo "$TG_TO" | xargs)
        
        # 构建发送的文本内容
        MSG_TEXT=$(cat << 'EOF'
        📊 **今日全球核心财经与科技全景看板**
        
        ${{ steps.read_report.outputs.REPORT_CONTENT }}
        EOF
        )
        
        # 直接使用官方原生 API 发送，完美免疫换行符漏洞
        curl -s -X POST "https://api.telegram.org/bot${CLEAN_TOKEN}/sendMessage" \
          -d "chat_id=${CLEAN_TO}" \
          -d "parse_mode=Markdown" \
          --data-urlencode "text=${MSG_TEXT}"
