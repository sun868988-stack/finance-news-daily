name: Financial News Daily Mailer

on:
  schedule:
    - cron: '7 0 * * *'
  workflow_dispatch:

jobs:
  send-news-mail:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run script and Send Mail
      env:
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python fetch_news.py

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Commit and Push Changes
      run: |
        git add *.md
        git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新今日财经新闻简报" && git push)

    - name: Read Daily Report and Send to Telegram
      env:
        TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TG_TO: ${{ secrets.TELEGRAM_TO }}
      run: |
        # 自动定位最新生成的 Markdown 文件
        LATEST_FILE=$(ls -t *.md 2>/dev/null 2>&1 | head -n 1)
        if [ -z "$LATEST_FILE" ]; then
          echo "未找到日报文件，跳过发送。"
          exit 0
        fi
        
        # 使用 Base64 编码读取内容，这是解决一切字符报错的终极方案
        CONTENT_BASE64=$(cat "$LATEST_FILE" | base64 -w 0)
        MSG_TEXT=$(echo "$CONTENT_BASE64" | base64 -d)
        
        # 强力剥离 Token 和 ID 中的空格与换行，确保 API 调用百分百成功
        CLEAN_TOKEN=$(echo "$TG_TOKEN" | tr -d '[:space:]')
        CLEAN_TO=$(echo "$TG_TO" | tr -d '[:space:]')
        
        # 执行发送
        curl -s -X POST "https://api.telegram.org/bot${CLEAN_TOKEN}/sendMessage" \
        -d "chat_id=${CLEAN_TO}" \
        -d "parse_mode=Markdown" \
        --data-urlencode "text=$MSG_TEXT"
