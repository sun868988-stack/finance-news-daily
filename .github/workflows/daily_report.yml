name: name: Financial News Daily Mailer

on:
  schedule:
    - cron: '7 0 * * *'
  workflow_dispatch:

jobs:
  send-news-mail:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run script and Send Mail
      # 将此前在 Settings 里配置的 Secrets 传递给 Python 脚本
      env:
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      run: python fetch_news.py

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Commit and Push Changes
      run: |
        git add *.md
        git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新今日财经新闻简报" && git push)

    - name: Read Daily Report Content
      id: read_report
      run: |
        # 自动寻找当前目录下最新生成的 .md 日报文件
        LATEST_FILE=$(ls -t *.md | head -n 1)
        echo "REPORT_CONTENT<<EOF" >> $GITHUB_OUTPUT
        cat "$LATEST_FILE" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Send Telegram Message
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        format: markdown
        message: |
          📊 **今日全球核心财经与科技全景看板**
          
          ${{ steps.read_report.outputs.REPORT_CONTENT }}
