Name: Financial News Daily Mailer

on:
  schedule:
    - cron: '7 0 * * *'
  workflow_dispatch:

jobs:
  send-news-mail:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run script and Send Mail
      env:
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        # 🛡️ 安全清理：已彻底移除传输给 Python 的 GEMINI_API_KEY
      run: python fetch_news.py

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Commit and Push Changes
      run: |
        git add *.md
        git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新今日财经新闻简报" && git push)

    # 🛡️ 安全清理：已彻底删除原有的 [Read Daily Report and Send to Telegram] 步骤
